<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAECON Security Agents — Phase 2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap');
:root {
--bg-dark: #050508;
--bg-panel: #0a0a0f;
--accent-cyan: #00f0ff;
--accent-green: #00ff41;
--accent-amber: #ffb000;
--accent-red: #ff0040;
--accent-purple: #bf00ff;
--accent-blue: #0080ff;
--text-primary: #e0e0e0;
--text-secondary: #666677;
--border-color: #1a1a25;
--state-clean: #00ff41;
--state-active: #00f0ff;
--state-overloaded: #ffb000;
--state-critical: #ff0040;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
font-family: 'Share Tech Mono', monospace;
background: var(--bg-dark);
color: var(--text-primary);
min-height: 100vh;
overflow: hidden;
}
.crt-overlay {
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
pointer-events: none;
z-index: 1000;
background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
background-size: 100% 3px;
opacity: 0.4;
}
.crt-overlay::before {
content: "";
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
background: rgba(255, 255, 255, 0.02);
animation: flicker 0.12s infinite;
}
@keyframes flicker {
0%, 100% { opacity: 0.02; }
50% { opacity: 0.06; }
}
.header {
background: var(--bg-panel);
border-bottom: 2px solid var(--accent-cyan);
padding: 0.8rem 1.5rem;
display: flex;
justify-content: space-between;
align-items: center;
position: relative;
z-index: 100;
height: 60px;
}
.logo {
font-family: 'VT323', monospace;
font-size: 2rem;
color: var(--accent-cyan);
text-shadow: 0 0 20px var(--accent-cyan);
letter-spacing: 3px;
display: flex;
align-items: center;
gap: 1rem;
}
.logo::before {
content: "◈";
animation: rotate 4s linear infinite;
}
@keyframes rotate {
from { transform: rotate(0deg); }
to { transform: rotate(360deg); }
}
.header-stats {
display: flex;
gap: 2rem;
font-size: 0.85rem;
}
.stat-item {
display: flex;
flex-direction: column;
align-items: center;
gap: 0.2rem;
}
.stat-label {
color: var(--text-secondary);
font-size: 0.7rem;
text-transform: uppercase;
letter-spacing: 1px;
}
.stat-value {
color: var(--accent-cyan);
font-weight: bold;
}
.health-bar {
width: 120px;
height: 6px;
background: var(--border-color);
border-radius: 3px;
overflow: hidden;
margin-top: 0.3rem;
}
.health-fill {
height: 100%;
background: linear-gradient(90deg, var(--accent-green), var(--accent-cyan));
transition: width 0.5s, background 0.5s;
animation: pulse-health 2s infinite;
}
@keyframes pulse-health {
0%, 100% { opacity: 1; }
50% { opacity: 0.7; }
}
.main-container {
display: grid;
grid-template-columns: 320px 1fr;
height: calc(100vh - 60px);
}
.command-center {
background: var(--bg-panel);
border-right: 1px solid var(--border-color);
display: flex;
flex-direction: column;
overflow: hidden;
}
.dashboard-tabs {
display: flex;
border-bottom: 1px solid var(--border-color);
}
.tab {
flex: 1;
padding: 0.8rem;
background: transparent;
border: none;
color: var(--text-secondary);
font-family: 'Share Tech Mono', monospace;
font-size: 0.75rem;
cursor: pointer;
transition: all 0.3s;
text-transform: uppercase;
letter-spacing: 1px;
}
.tab:hover, .tab.active {
color: var(--accent-cyan);
background: rgba(0, 240, 255, 0.05);
}
.tab.active {
border-bottom: 2px solid var(--accent-cyan);
}
.dashboard-content {
flex: 1;
overflow-y: auto;
padding: 1rem;
}
.panel { display: none; }
.panel.active {
display: block;
animation: fadeIn 0.3s;
}
@keyframes fadeIn {
from { opacity: 0; transform: translateY(10px); }
to { opacity: 1; transform: translateY(0); }
}
.control-group {
margin-bottom: 1.2rem;
padding: 0.8rem;
background: rgba(0, 0, 0, 0.3);
border: 1px solid var(--border-color);
border-radius: 4px;
transition: border-color 0.3s;
}
.control-group:hover { border-color: var(--accent-cyan); }
.control-label {
display: block;
font-size: 0.75rem;
color: var(--text-secondary);
margin-bottom: 0.5rem;
text-transform: uppercase;
letter-spacing: 1px;
}
select, input[type="range"], input[type="time"], input[type="text"] {
width: 100%;
background: var(--bg-dark);
border: 1px solid var(--border-color);
color: var(--text-primary);
padding: 0.5rem;
font-family: 'Share Tech Mono', monospace;
font-size: 0.8rem;
border-radius: 2px;
}
input[type="range"] {
-webkit-appearance: none;
height: 4px;
background: var(--border-color);
padding: 0;
}
input[type="range"]::-webkit-slider-thumb {
-webkit-appearance: none;
width: 12px;
height: 12px;
background: var(--accent-cyan);
cursor: pointer;
border-radius: 50%;
}
.range-value {
text-align: right;
color: var(--accent-cyan);
font-size: 0.75rem;
margin-top: 0.3rem;
}
.btn {
width: 100%;
padding: 0.7rem;
background: transparent;
border: 1px solid var(--accent-cyan);
color: var(--accent-cyan);
font-family: 'Share Tech Mono', monospace;
font-size: 0.8rem;
cursor: pointer;
transition: all 0.3s;
text-transform: uppercase;
letter-spacing: 1px;
margin-bottom: 0.5rem;
position: relative;
overflow: hidden;
}
.btn::before {
content: '';
position: absolute;
top: 0;
left: -100%;
width: 100%;
height: 100%;
background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.2), transparent);
transition: left 0.5s;
}
.btn:hover::before { left: 100%; }
.btn:hover {
background: var(--accent-cyan);
color: var(--bg-dark);
box-shadow: 0 0 20px var(--accent-cyan);
}
.btn-urgent {
border-color: var(--accent-red);
color: var(--accent-red);
animation: urgent-pulse 1.5s infinite;
}
.btn-urgent:hover {
background: var(--accent-red);
color: white;
box-shadow: 0 0 20px var(--accent-red);
}
@keyframes urgent-pulse {
0%, 100% { opacity: 1; border-color: var(--accent-red); }
50% { opacity: 0.6; border-color: #ff6666; }
}
.btn-ai {
border-color: var(--accent-purple);
color: var(--accent-purple);
}
.btn-ai:hover {
background: var(--accent-purple);
box-shadow: 0 0 20px var(--accent-purple);
}
.btn-ai.active {
background: var(--accent-purple);
color: white;
}
.log-container {
height: 200px;
overflow-y: auto;
background: var(--bg-dark);
border: 1px solid var(--border-color);
padding: 0.5rem;
font-size: 0.75rem;
}
.log-entry {
padding: 0.4rem;
margin-bottom: 0.3rem;
border-left: 2px solid var(--accent-cyan);
padding-left: 0.5rem;
animation: slideIn 0.3s;
}
@keyframes slideIn {
from { opacity: 0; transform: translateX(-10px); }
to { opacity: 1; transform: translateX(0); }
}
.log-time { color: var(--accent-amber); font-size: 0.7rem; }
.log-agent { color: var(--accent-green); }
.log-event { color: var(--text-primary); }
.building-container {
position: relative;
overflow: hidden;
background: linear-gradient(180deg, #020204 0%, #0a0a12 100%);
}
#building-canvas {
width: 100%;
height: 100%;
image-rendering: pixelated;
}
.elevator-shaft {
position: absolute;
left: 50%;
top: 0;
width: 60px;
height: 100%;
transform: translateX(-50%);
border-left: 2px dashed var(--border-color);
border-right: 2px dashed var(--border-color);
pointer-events: none;
}
.state-legend {
position: absolute;
top: 20px;
right: 20px;
background: rgba(0, 0, 0, 0.8);
border: 1px solid var(--border-color);
padding: 1rem;
border-radius: 4px;
}
.state-item {
display: flex;
align-items: center;
gap: 0.5rem;
margin-bottom: 0.5rem;
font-size: 0.75rem;
}
.state-dot {
width: 10px;
height: 10px;
border-radius: 50%;
}
.state-clean {
background: var(--state-clean);
box-shadow: 0 0 10px var(--state-clean);
}
.state-active {
background: var(--state-active);
box-shadow: 0 0 10px var(--state-active);
}
.state-overloaded {
background: var(--state-overloaded);
animation: blink 1s infinite;
}
.state
